# This configmap contains the distribution images for the llama-stack operator
# The configmap should only be updated at build time.
apiVersion: v1
kind: ConfigMap
metadata:
  name: distribution-images
  namespace: system
# The distribution images are immutable and should not be updated
immutable: true
data:
  ollama: docker.io/llamastack/distribution-ollama:0.9.0
  hf-endpoint: docker.io/llamastack/distribution-hf-endpoint:0.9.0
  hf-serverless: docker.io/llamastack/distribution-hf-serverless:0.9.0
  bedrock: docker.io/llamastack/distribution-bedrock:0.9.0
  cerebras: docker.io/llamastack/distribution-cerebras:0.9.0
  nvidia: docker.io/llamastack/distribution-nvidia:0.9.0
  open-benchmark: docker.io/llamastack/distribution-open-benchmark:0.9.0
  passthrough: docker.io/llamastack/distribution-passthrough:0.9.0
  remote-vllm: docker.io/llamastack/distribution-remote-vllm:0.9.0
  sambanova: docker.io/llamastack/distribution-sambanova:0.9.0
  tgi: docker.io/llamastack/distribution-tgi:0.9.0
  together: docker.io/llamastack/distribution-together:0.9.0
  vllm-gpu: docker.io/llamastack/distribution-vllm-gpu:0.9.0
  watsonx: docker.io/llamastack/distribution-watsonx:0.9.0
  fireworks: docker.io/llamastack/distribution-fireworks:0.9.0
